<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Khaal — IA Générale</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">

<div class="layout">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <div class="sidebar-logo">
                <div class="brand-icon">⚡</div>
                <div class="brand-name">Khaal</div>
            </div>
            <button class="sidebar-collapse" id="collapse-btn" aria-label="Réduire la sidebar">«</button>
        </div>

        <div class="sidebar-search">
            <span class="sidebar-search-icon">🔍</span>
            <input id="sidebar-search" placeholder="Rechercher" />
        </div>

        <nav class="sidebar-nav">
            <button class="sidebar-item active" data-section="chat" id="chat-btn">
                <span class="sidebar-item-icon">💬</span>
                <span class="sidebar-item-label">Chat</span>
            </button>
            <button class="sidebar-item" data-section="voice" id="voice-btn">
                <span class="sidebar-item-icon">🎙️</span>
                <span class="sidebar-item-label">Voix</span>
            </button>
            <button class="sidebar-item" data-section="imagine" id="imagine-btn">
                <span class="sidebar-item-icon">🎨</span>
                <span class="sidebar-item-label">Imagine</span>
            </button>
        </nav>

        <div class="sidebar-section">
            <button class="sidebar-section-header" id="projects-toggle">
                <span>Projets</span>
                <span class="sidebar-section-caret">▾</span>
            </button>
            <div class="sidebar-section-body" id="projects-list">
                <button class="sidebar-item small" id="new-project-btn">
                    <span class="sidebar-item-icon">＋</span>
                    <span class="sidebar-item-label">Nouveau projet</span>
                </button>
            </div>
        </div>

        <div class="sidebar-section">
            <button class="sidebar-section-header" id="history-toggle">
                <span>Historique</span>
                <span class="sidebar-section-caret">▾</span>
            </button>
            <div class="sidebar-section-body" id="history-list"></div>
        </div>

        <div class="sidebar-footer">
            <div class="user-avatar" id="user-avatar" title="Profil">
                <span>👤</span>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="center-panel">
            <div class="logo-overlay" id="logo-overlay">
                <div class="logo-center">
                    <div class="logo-text">KHAAL</div>
                    <div class="logo-sub">IA Générale</div>
                </div>
            </div>
            <div class="input-box">
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><polyline points="7 7 12 12 17 7"/></svg>
                    <textarea id="user-input" rows="1" placeholder="Que voulez-vous savoir ?"></textarea>
                    <button id="send-button" title="Envoyer" class="send-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10v4a8 8 0 0 0 16 0v-4"/><path d="M8.5 12a3.5 3.5 0 0 1 7 0"/><path d="M12 19v3"/></svg>
                    </button>
                </div>
                <div class="input-hint">Shift+Entrée pour une nouvelle ligne.</div>
                <div class="footer-note">En envoyant un message à Khaal, vous acceptez nos <a href="#">Termes</a> et <a href="#">Politique de confidentialité</a>.</div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-messages" id="chat-messages">
                <!-- Messages will be appended here -->
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modal-overlay" aria-hidden="true"></div>

    <div class="modal" id="modal-login" aria-hidden="true">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Connexion</div>
                <button class="modal-close" data-modal="modal-login" aria-label="Fermer">×</button>
            </div>
            <div class="modal-body">
                <label>Adresse email
                    <input type="email" id="login-email" placeholder="vous@exemple.com" />
                </label>
                <label>Mot de passe
                    <input type="password" id="login-password" placeholder="••••••••" />
                </label>
            </div>
            <div class="modal-actions">
                <button class="modal-btn" id="login-submit">Se connecter</button>
                <button class="modal-link" data-open="modal-signup">Créer un compte</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modal-signup" aria-hidden="true">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Inscription</div>
                <button class="modal-close" data-modal="modal-signup" aria-label="Fermer">×</button>
            </div>
            <div class="modal-body">
                <label>Nom d'utilisateur
                    <input type="text" id="signup-username" placeholder="Votre nom" />
                </label>
                <label>Adresse email
                    <input type="email" id="signup-email" placeholder="vous@exemple.com" />
                </label>
                <label>Mot de passe
                    <input type="password" id="signup-password" placeholder="••••••••" />
                </label>
            </div>
            <div class="modal-actions">
                <button class="modal-btn" id="signup-submit">S'inscrire</button>
                <button class="modal-link" data-open="modal-login">J'ai déjà un compte</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modal-settings" aria-hidden="true">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Paramètres</div>
                <button class="modal-close" data-modal="modal-settings" aria-label="Fermer">×</button>
            </div>
            <div class="modal-body">
                <div class="settings-item">
                    <div>Thème</div>
                    <select id="settings-theme">
                        <option value="dark">Sombre</option>
                        <option value="light">Clair</option>
                    </select>
                </div>
                <div class="settings-item">
                    <div>Nom affiché</div>
                    <input type="text" id="settings-username" placeholder="Nom" />
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn" id="settings-save">Sauvegarder</button>
            </div>
        </div>
    </div>
<script>
    const body = document.body;
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');

    const sendButton = document.getElementById('send-button');
    const userInput = document.getElementById('user-input');
    const chatContainer = document.getElementById('chat-messages');
    const logoOverlay = document.getElementById('logo-overlay');

    const sidebar = document.getElementById('sidebar');
    const collapseBtn = document.getElementById('collapse-btn');
    const searchInput = document.getElementById('sidebar-search');

    const chatBtn = document.getElementById('chat-btn');
    const voiceBtn = document.getElementById('voice-btn');
    const imagineBtn = document.getElementById('imagine-btn');

    const projectsToggle = document.getElementById('projects-toggle');
    const projectsList = document.getElementById('projects-list');
    const historyToggle = document.getElementById('history-toggle');
    const historyList = document.getElementById('history-list');
    const newProjectBtn = document.getElementById('new-project-btn');

    const loginBtn = document.getElementById('login-btn');
    const signupBtn = document.getElementById('signup-btn');
    const settingsBtn = document.getElementById('settings-btn');

    const modalOverlay = document.getElementById('modal-overlay');
    const modalLogin = document.getElementById('modal-login');
    const modalSignup = document.getElementById('modal-signup');
    const modalSettings = document.getElementById('modal-settings');

    const settingsThemeSelect = document.getElementById('settings-theme');
    const settingsUsername = document.getElementById('settings-username');
    const collapseBtn = document.getElementById('collapse-btn');

    const STORAGE_KEY = 'khaal_app_state_v1';

    const state = {
        user: null,
        conversations: [],
        activeId: null,
    };

    function generateId() {
        return `c_${Date.now()}_${Math.random().toString(16).slice(2)}`;
    }

    function loadState() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                const parsed = JSON.parse(raw);
                Object.assign(state, parsed);
            }
        } catch {
            // ignore
        }

        if (!state.conversations || state.conversations.length === 0) {
            const first = createConversation('Nouvelle conversation');
            state.activeId = first.id;
        }

        if (!state.activeId && state.conversations.length) {
            state.activeId = state.conversations[0].id;
        }
    }

    function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function createConversation(title = 'Nouvelle conversation') {
        const conversation = {
            id: generateId(),
            title,
            createdAt: Date.now(),
            messages: [],
        };
        state.conversations.unshift(conversation);
        state.activeId = conversation.id;
        saveState();
        renderHistory();
        renderChat();
        return conversation;
    }

    function getActiveConversation() {
        return state.conversations.find((c) => c.id === state.activeId);
    }

    function setActiveConversation(id) {
        state.activeId = id;
        saveState();
        renderHistory();
        renderChat();
    }

    function renderHistory() {
        historyList.innerHTML = '';
        state.conversations.forEach((conv) => {
            const item = document.createElement('button');
            item.type = 'button';
            item.className = 'conversation-item' + (conv.id === state.activeId ? ' active' : '');
            item.textContent = conv.title || 'Conversation';
            item.addEventListener('click', () => {
                setActiveConversation(conv.id);
                closePanel();
            });
            historyList.appendChild(item);
        });
    }

    function renderChat() {
        const conversation = getActiveConversation();
        chatContainer.innerHTML = '';
        if (!conversation) return;

        conversation.messages.forEach((msg) => {
            renderMessage(msg.sender, msg.text);
        });

        updateLogoVisibility();
        scrollToBottom();
    }

    function renderMessage(sender, text) {
        const messageEl = document.createElement('div');
        messageEl.className = `message ${sender}`;

        const avatar = sender === 'khaal' ? 'KH' : 'VOUS';
        const senderName = sender === 'khaal' ? 'Khaal' : 'Vous';

        const formattedText = text.replace(/\n/g, '<br>');

        messageEl.innerHTML = `
            <div class="message-avatar">${avatar}</div>
            <div class="message-content">
                <div class="message-sender">${senderName}</div>
                <div class="message-text">
                    <p>${formattedText}</p>
                </div>
            </div>
        `;

        chatContainer.appendChild(messageEl);
    }

    function updateActiveConversationTitle() {
        const conversation = getActiveConversation();
        if (!conversation) return;
        const lastUser = [...conversation.messages].reverse().find((m) => m.sender === 'user');
        if (lastUser && lastUser.text.trim().length > 0) {
            const preview = lastUser.text.trim().split('\n')[0].slice(0, 32);
            conversation.title = preview + (preview.length < lastUser.text.trim().length ? '…' : '');
            saveState();
            renderHistory();
        }
    }

    function storeMessage(sender, text) {
        const conversation = getActiveConversation();
        if (!conversation) return;
        conversation.messages.push({ sender, text, ts: Date.now() });
        saveState();
        updateActiveConversationTitle();
    }

    function openModal(modal) {
        modal.setAttribute('aria-hidden', 'false');
        modal.classList.add('open');
        modalOverlay.setAttribute('aria-hidden', 'false');
        modalOverlay.classList.add('visible');
    }

    function closeModal(modal) {
        modal.setAttribute('aria-hidden', 'true');
        modal.classList.remove('open');
        modalOverlay.setAttribute('aria-hidden', 'true');
        modalOverlay.classList.remove('visible');
    }

    function setUser(user) {
        state.user = user;
        saveState();
        if (user && user.name) {
            loginBtn.textContent = user.name;
            signupBtn.style.display = 'none';
        } else {
            loginBtn.textContent = 'Se connecter';
            signupBtn.style.display = 'inline-flex';
        }
    }

    function applyTheme(theme) {
        if (theme === 'light') {
            body.classList.replace('dark-mode', 'light-mode');
            themeIcon.textContent = '🌙';
        } else {
            body.classList.replace('light-mode', 'dark-mode');
            themeIcon.textContent = '☀️';
        }
        localStorage.setItem('theme', theme);
    }

    function init() {
        loadState();
        renderHistory();
        renderChat();

        // theme init
        const currentTheme = localStorage.getItem('theme') || 'dark';
        applyTheme(currentTheme);

        // user init
        if (state.user) {
            setUser(state.user);
        }

        // Settings UI
        settingsThemeSelect.value = currentTheme;
        if (state.user?.name) {
            settingsUsername.value = state.user.name;
        }

        // Sidebar collapse logic
        if (localStorage.getItem('sidebar_collapsed') === 'true') {
            document.body.classList.add('sidebar-collapsed');
        }

        collapseBtn.addEventListener('click', () => {
            document.body.classList.toggle('sidebar-collapsed');
            localStorage.setItem('sidebar_collapsed', document.body.classList.contains('sidebar-collapsed'));
        });

        // Event listeners
        themeToggle.addEventListener('click', () => {
            const next = body.classList.contains('dark-mode') ? 'light' : 'dark';
            applyTheme(next);
        });

        const setActiveMenu = (activeBtn) => {
            [chatBtn, voiceBtn, imagineBtn].forEach((btn) => {
                btn.classList.toggle('active', btn === activeBtn);
            });
        };

        chatBtn.addEventListener('click', () => setActiveMenu(chatBtn));
        voiceBtn.addEventListener('click', () => setActiveMenu(voiceBtn));
        imagineBtn.addEventListener('click', () => setActiveMenu(imagineBtn));

        projectsToggle.addEventListener('click', () => {
            projectsList.classList.toggle('collapsed');
            projectsToggle.querySelector('.sidebar-section-caret').classList.toggle('rotated');
        });

        historyToggle.addEventListener('click', () => {
            historyList.classList.toggle('collapsed');
            historyToggle.querySelector('.sidebar-section-caret').classList.toggle('rotated');
        });

        newProjectBtn.addEventListener('click', () => {
            createConversation('Nouvelle conversation');
            userInput.focus();
        });

        loginBtn.addEventListener('click', () => openModal(modalLogin));
        signupBtn.addEventListener('click', () => openModal(modalSignup));
        settingsBtn.addEventListener('click', () => openModal(modalSettings));

        modalOverlay.addEventListener('click', () => {
            closeModal(modalLogin);
            closeModal(modalSignup);
            closeModal(modalSettings);
        });

        document.querySelectorAll('.modal-close').forEach((btn) => {
            const modalId = btn.getAttribute('data-modal');
            btn.addEventListener('click', () => closeModal(document.getElementById(modalId)));
        });

        document.querySelectorAll('.modal-link').forEach((btn) => {
            const openId = btn.getAttribute('data-open');
            btn.addEventListener('click', () => {
                closeModal(modalLogin);
                closeModal(modalSignup);
                openModal(document.getElementById(openId));
            });
        });

        document.getElementById('login-submit').addEventListener('click', () => {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();
            if (!email || !password) return;
            setUser({ name: email.split('@')[0], email });
            closeModal(modalLogin);
        });

        document.getElementById('signup-submit').addEventListener('click', () => {
            const name = document.getElementById('signup-username').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value.trim();
            if (!name || !email || !password) return;
            setUser({ name, email });
            closeModal(modalSignup);
        });

        document.getElementById('settings-save').addEventListener('click', () => {
            const theme = settingsThemeSelect.value;
            const name = settingsUsername.value.trim();
            applyTheme(theme);
            if (name) {
                setUser({ ...state.user, name });
            }
            closeModal(modalSettings);
        });

        // Chat listeners
        sendButton.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        userInput.addEventListener('input', () => {
            autoResize();
            updateLogoVisibility();
        });

        updateLogoVisibility();
        userInput.focus();
    }

    function autoResize() {
        userInput.style.height = 'auto';
        userInput.style.height = userInput.scrollHeight + 'px';
    }

    function updateLogoVisibility() {
        const hasText = userInput.value.trim().length > 0;
        const conversation = getActiveConversation();
        const hasMessages = conversation && conversation.messages.length > 0;
        const shouldHide = hasText || hasMessages;

        logoOverlay.style.opacity = shouldHide ? '0' : '1';
    }

    async function sendMessage() {
        const messageText = userInput.value.trim();
        if (!messageText) return;

        storeMessage('user', messageText);
        renderChat();
        userInput.value = '';
        autoResize();

        showTypingIndicator();

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: messageText })
            });

            if (!res.ok) {
                throw new Error(`Server error: ${res.status}`);
            }

            const data = await res.json();
            removeTypingIndicator();
            storeMessage('khaal', data.reponse);
            renderChat();
        } catch (error) {
            console.error('Error fetching response:', error);
            removeTypingIndicator();
            storeMessage('khaal', "Désolé, une erreur de communication est survenue.");
            renderChat();
        }
    }

    function showTypingIndicator() {
        if (document.getElementById('typing-indicator')) return;

        const typingEl = document.createElement('div');
        typingEl.id = 'typing-indicator';
        typingEl.className = 'message khaal';
        typingEl.innerHTML = `
            <div class="message-avatar">KH</div>
            <div class="message-content">
                <div class="message-sender">Khaal</div>
                <div class="message-text">
                    <div class="typing-dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>
        `;

        const style = document.createElement('style');
        style.textContent = `
            .typing-dots span {
                display: inline-block;
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: var(--fg-muted);
                animation: typing-bounce 1.2s infinite ease-in-out;
            }
            .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
            .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
            @keyframes typing-bounce {
                0%, 80%, 100% { transform: scale(0); }
                40% { transform: scale(1.0); }
            }
        `;
        typingEl.appendChild(style);
        chatContainer.appendChild(typingEl);
        scrollToBottom();
    }

    function removeTypingIndicator() {
        const typingEl = document.getElementById('typing-indicator');
        if (typingEl) {
            typingEl.remove();
        }
    }

    function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    init();
</script>
</body>
</html>
