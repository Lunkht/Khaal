<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khaal — IA Générale</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="dark-mode">

    <!-- LOGIN SCREEN OVERLAY -->
    <div id="login-screen" class="login-screen" style="display: none;">
        <div class="login-left">
            <div class="login-logo-container">
                <img src="icon.svg" class="khaal-icon" alt="Khaal" width="32" height="32">
            </div>
            <div class="login-form-wrapper">
                <h1>Connectez-vous à votre compte</h1>
                <button class="auth-btn x-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path
                            d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"
                            fill="currentColor" />
                    </svg>
                    Se connecter avec X
                </button>
                <div class="divider"></div>
                <button class="auth-btn email-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                        <polyline points="22,6 12,13 2,6" />
                    </svg>
                    Se connecter avec e-mail
                </button>
                <button class="auth-btn google-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                    Se connecter avec Google
                </button>
                <button class="auth-btn apple-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path
                            d="M16.365 1.43c1.373-.41 2.38 1.49 2.21 2.45-.7 4.12-4.8 3.84-5.2.22-.05-1.58 1.63-2.27 2.99-2.67M12.445 6.09c-2.48.06-4.78 1.57-6.07 3.5-2.79 4.16-2.52 9.77.26 13.9 1.34 1.99 3.1 4.14 5.22 4.04 2.1-.09 2.91-1.34 5.39-1.34 2.48 0 3.19 1.36 5.4 1.3 2.15-.05 3.65-1.91 4.89-3.75 1.46-2.15 2-4.22 2.03-4.32-.05-.03-4.05-1.55-4.08-6.19-.03-3.89 3.18-5.74 3.32-5.83-1.85-2.71-4.71-3.08-5.71-3.14-2.42-.23-4.79 1.43-6.06 1.43-1.29 0-3.23-1.48-5.18-1.54"
                            fill="currentColor" />
                    </svg>
                    Se connecter avec Apple
                </button>
                <div class="signup-prompt">
                    Vous n'avez pas de compte ? <a href="#" id="show-signup">S'inscrire</a>
                </div>

                <div class="login-footer-terms">
                    En continuant, vous acceptez les <a>Conditions d'utilisation</a> et la <a>Politique de
                        confidentialité</a> de Khaal.
                </div>
            </div>
        </div>
        <div class="login-right">
            <!-- The glowing large logo graphic background will go here via CSS -->
        </div>
    </div>

    <div class="layout" id="main-layout">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="sidebar-logo">
                    <img src="icon.svg" width="28" height="28" alt="Khaal">
                </div>
                <button class="sidebar-collapse" id="collapse-btn" aria-label="Réduire la sidebar">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M13 17l5-5-5-5M6 17l5-5-5-5" />
                    </svg>
                </button>
            </div>

            <nav class="sidebar-nav">
                <button class="sidebar-item" id="search-nav-btn">
                    <span class="sidebar-item-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                    </span>
                    <span class="sidebar-item-label">Rechercher</span>
                </button>
                <button class="sidebar-item active" data-section="chat" id="chat-btn">
                    <span class="sidebar-item-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14l4-4h5c1.1 0 2-.9 2-2v-5" />
                            <path d="M15 8h6M18 5v6" />
                        </svg>
                    </span>
                    <span class="sidebar-item-label">Chat</span>
                </button>
                <button class="sidebar-item" data-section="voice" id="voice-btn">
                    <span class="sidebar-item-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2v10" />
                            <path d="M8 6h8" />
                            <path d="M6 10h12" />
                            <path d="M4 14h16" />
                        </svg>
                    </span>
                    <span class="sidebar-item-label">Voix</span>
                </button>
                <button class="sidebar-item" data-section="imagine" id="imagine-btn">
                    <span class="sidebar-item-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                            <circle cx="8.5" cy="8.5" r="1.5" />
                            <polyline points="21 15 16 10 5 21" />
                        </svg>
                    </span>
                    <span class="sidebar-item-label">Imagine</span>
                </button>
            </nav>

            <div class="sidebar-section">
                <button class="sidebar-section-header" id="projects-toggle">
                    <span>Projets</span>
                    <span class="sidebar-section-caret">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9" />
                        </svg>
                    </span>
                </button>
                <div class="sidebar-section-body" id="projects-list">
                    <button class="sidebar-item-text" id="new-project-btn">
                        <span class="sidebar-item-text-icon">+</span>
                        <span>New Project</span>
                    </button>
                </div>
            </div>

            <div class="sidebar-section flex-1-scroll">
                <button class="sidebar-section-header" id="history-toggle">
                    <span>Historique</span>
                    <span class="sidebar-section-caret">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9" />
                        </svg>
                    </span>
                </button>
                <div class="sidebar-section-body" id="history-list">
                    <!-- History items appended here -->
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="user-profile-btn" id="login-nav-btn">
                    <div class="user-avatar">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </div>
                </button>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- Top Right Actions (Imagine, Settings, Login, Signup) -->
            <div class="top-nav">
                <button class="top-nav-btn"><svg viewBox="0 0 24 24" width="16" height="16" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </svg> Imagine</button>
                <button class="top-nav-icon"><svg viewBox="0 0 24 24" width="18" height="18" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg></button>
                <button class="top-nav-btn login-trigger" id="top-login-btn">Se connecter</button>
                <button class="top-nav-btn primary signup-trigger" id="top-signup-btn">S'inscrire</button>
            </div>

            <div class="chat-area" id="chat-area">
                <div class="chat-messages" id="chat-messages">
                    <!-- Messages will be appended here -->
                </div>
            </div>

            <!-- Center content when empty -->
            <div class="center-panel" id="center-panel">
                <div class="logo-overlay" id="logo-overlay">
                    <div class="logo-flex">
                        <img src="icon.svg" height="48" alt="Khaal Logo">
                    </div>
                </div>
            </div>

            <div class="input-box-container">
                <div class="input-box">
                    <div class="input-wrapper">
                        <button class="input-icon-btn attach-btn">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
                            </svg>
                        </button>

                        <textarea id="user-input" rows="1" placeholder="Que voulez-vous savoir ?"></textarea>

                        <div class="input-actions-right">
                            <button class="dropdown-btn">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
                                </svg>
                                Automatique
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <polyline points="6 9 12 15 18 9" />
                                </svg>
                            </button>
                            <button class="input-icon-btn">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M12 2v10" />
                                    <path d="M8 6h8" />
                                    <path d="M6 10h12" />
                                    <path d="M4 14h16" />
                                </svg>
                            </button>
                            <button class="input-icon-btn active-icon">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M12 2v20M17 5v14M7 8v8M22 10v4M2 11v2" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="footer-note">En envoyant un message à Khaal, vous acceptez nos <a href="#">Termes</a> et
                        <a href="#">Politique de confidentialité</a>.</div>
                </div>
            </div>
        </main>

    </div>

    <script>
        const STORAGE_KEY = 'khaal_app_state_v1';
        const state = {
            user: null,
            conversations: [],
            activeId: null,
        };

        const DOM = {
            userInput: document.getElementById('user-input'),
            chatMessages: document.getElementById('chat-messages'),
            historyList: document.getElementById('history-list'),
            loginScreen: document.getElementById('login-screen'),
            mainLayout: document.getElementById('main-layout'),
            loginTriggers: document.querySelectorAll('.login-trigger, #login-nav-btn, .x-btn, .email-btn, .google-btn, .apple-btn'),
            logoOverlay: document.getElementById('logo-overlay'),
            centerPanel: document.getElementById('center-panel'),
            collapseBtn: document.getElementById('collapse-btn'),
            sidebar: document.getElementById('sidebar'),
            projectsToggle: document.getElementById('projects-toggle'),
            projectsList: document.getElementById('projects-list'),
            historyToggle: document.getElementById('history-toggle'),
        };

        function init() {
            // Modal toggles
            DOM.loginTriggers.forEach(btn => {
                btn.addEventListener('click', () => {
                    if (DOM.loginScreen.style.display === 'none') {
                        DOM.loginScreen.style.display = 'flex';
                        DOM.mainLayout.style.display = 'none';
                    } else {
                        DOM.loginScreen.style.display = 'none';
                        DOM.mainLayout.style.display = 'flex';
                    }
                });
            });

            // Chat logic
            function generateId() { return `c_${Date.now()}_${Math.random().toString(16).slice(2)}`; }
            function loadState() {
                try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) Object.assign(state, JSON.parse(raw)); } catch { }
                if (!state.conversations.length) createConversation('Nouvelle conversation');
                if (!state.activeId && state.conversations.length) state.activeId = state.conversations[0].id;
            }
            function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
            function createConversation(title = 'Nouvelle conversation') {
                const conversation = { id: generateId(), title, createdAt: Date.now(), messages: [] };
                state.conversations.unshift(conversation);
                state.activeId = conversation.id;
                saveState(); renderHistory(); renderChat();
                return conversation;
            }
            function getActiveConversation() { return state.conversations.find((c) => c.id === state.activeId); }
            function setActiveConversation(id) { state.activeId = id; saveState(); renderHistory(); renderChat(); }

            function renderHistory() {
                DOM.historyList.innerHTML = '';
                state.conversations.forEach((conv) => {
                    const item = document.createElement('button');
                    item.className = 'sidebar-item-text' + (conv.id === state.activeId ? ' active' : '');
                    item.textContent = conv.title || 'Conversation';
                    item.addEventListener('click', () => setActiveConversation(conv.id));
                    DOM.historyList.appendChild(item);
                });
            }

            function renderMessage(sender, text) {
                const msgEl = document.createElement('div');
                msgEl.className = `message ${sender}`;
                const avatar = sender === 'khaal' ? 'KH' : 'VOUS';
                const name = sender === 'khaal' ? 'Khaal' : 'Vous';
                msgEl.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
                    <div class="message-sender">${name}</div>
                    <div class="message-text"><p>${text.replace(/\n/g, '<br>')}</p></div>
                </div>
            `;
                DOM.chatMessages.appendChild(msgEl);
            }

            function renderChat() {
                const conv = getActiveConversation();
                DOM.chatMessages.innerHTML = '';
                if (!conv) return;
                conv.messages.forEach(msg => renderMessage(msg.sender, msg.text));
                updateCenterVisibility();
                scrollToBottom();
            }

            function storeMessage(sender, text) {
                const conv = getActiveConversation();
                if (!conv) return;
                conv.messages.push({ sender, text, ts: Date.now() });
                saveState(); updateCenterVisibility();
            }

            function updateCenterVisibility() {
                const hasText = DOM.userInput.value.trim().length > 0;
                const conv = getActiveConversation();
                const hasMessages = conv && conv.messages.length > 0;
                if (hasMessages) {
                    DOM.centerPanel.style.display = 'none';
                } else {
                    DOM.centerPanel.style.display = 'flex';
                    DOM.logoOverlay.style.opacity = hasText ? '0' : '1';
                }
            }

            function scrollToBottom() {
                const chatArea = document.getElementById('chat-area');
                chatArea.scrollTop = chatArea.scrollHeight;
            }

            async function sendMessage() {
                const text = DOM.userInput.value.trim();
                if (!text) return;
                storeMessage('user', text);
                renderChat();
                DOM.userInput.value = '';
                DOM.userInput.style.height = 'auto';

                // Simulate response or fetch
                try {
                    const res = await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: text })
                    });
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    storeMessage('khaal', data.reponse);
                } catch {
                    storeMessage('khaal', "Désolé, je ne peux pas me connecter au serveur.");
                }
                renderChat();
            }

            DOM.userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
            });
            DOM.userInput.addEventListener('input', () => {
                DOM.userInput.style.height = 'auto';
                DOM.userInput.style.height = DOM.userInput.scrollHeight + 'px';
                updateCenterVisibility();
            });

            document.getElementById('new-project-btn').addEventListener('click', () => {
                createConversation(); DOM.userInput.focus();
            });

            DOM.collapseBtn.addEventListener('click', () => {
                DOM.sidebar.classList.toggle('collapsed');
            });

            DOM.projectsToggle.addEventListener('click', () => {
                DOM.projectsList.classList.toggle('collapsed');
                DOM.projectsToggle.querySelector('.sidebar-section-caret').style.transform = DOM.projectsList.classList.contains('collapsed') ? 'rotate(-90deg)' : '';
            });
            DOM.historyToggle.addEventListener('click', () => {
                DOM.historyList.classList.toggle('collapsed');
                DOM.historyToggle.querySelector('.sidebar-section-caret').style.transform = DOM.historyList.classList.contains('collapsed') ? 'rotate(-90deg)' : '';
            });

            loadState();
            renderHistory();
            renderChat();
        }

        init();
    </script>
</body>

</html>
