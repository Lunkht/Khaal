<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Khaal — IA Générale</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">KHAAL</div>
        <div class="sidebar-title">Conversations</div>
        <div class="conversation-list">
            <div class="conversation-item active">Session Actuelle</div>
        </div>

        <div class="sidebar-footer">
            <div class="theme-toggle-container">
                <button class="theme-toggle" id="theme-toggle">
                    <span>Changer de thème</span>
                    <span class="icon" id="theme-icon">☀️</span>
                </button>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <div class="logo-overlay" id="logo-overlay" aria-hidden="true">
            <div class="logo-center">
                <div class="logo-text">KHAAL</div>
                <div class="logo-sub">IA Générale</div>
            </div>
        </div>
        <div class="chat-area">
            <div class="chat-messages" id="chat-messages">
                <!-- Messages will be appended here -->
            </div>
        </div>

        <div class="input-area-container">
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea
                        id="user-input"
                        rows="1"
                        placeholder="Discutez avec Khaal..."
                    ></textarea>
                    <button id="send-button" title="Envoyer">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-arrow-up"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                    </button>
                </div>
                <div class="input-hint">Shift+Entrée pour une nouvelle ligne.</div>
            </div>
        </div>
    </main>
</div>

<script>
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    const body = document.body;
    const sendButton = document.getElementById('send-button');
    const userInput = document.getElementById('user-input');
    const chatContainer = document.getElementById('chat-messages');
    const logoOverlay = document.getElementById('logo-overlay');

    // --- Theme Manager ---
    const currentTheme = localStorage.getItem('theme') || 'dark';
    if (currentTheme === 'light') {
        body.classList.replace('dark-mode', 'light-mode');
        themeIcon.textContent = '🌙';
    } else {
        themeIcon.textContent = '☀️';
    }

    themeToggle.addEventListener('click', () => {
        if (body.classList.contains('dark-mode')) {
            body.classList.replace('dark-mode', 'light-mode');
            localStorage.setItem('theme', 'light');
            themeIcon.textContent = '🌙';
        } else {
            body.classList.replace('light-mode', 'dark-mode');
            localStorage.setItem('theme', 'dark');
            themeIcon.textContent = '☀️';
        }
    });


    // --- Chat Logic ---
    sendButton.addEventListener('click', sendMessage);

    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    userInput.addEventListener('input', () => {
        autoResize();
        updateLogoVisibility();
    });

    function autoResize() {
        userInput.style.height = 'auto';
        userInput.style.height = userInput.scrollHeight + 'px';
    }

    function updateLogoVisibility() {
        const hasText = userInput.value.trim().length > 0;
        const hasMessages = chatContainer.children.length > 0;
        const shouldHide = hasText || hasMessages;

        if (shouldHide) {
            logoOverlay.style.opacity = '0';
        } else {
            logoOverlay.style.opacity = '1';
        }
    }

    async function sendMessage() {
        const messageText = userInput.value.trim();
        if (!messageText) return;

        appendMessage('user', messageText);
        userInput.value = '';
        autoResize();

        // Show typing indicator
        showTypingIndicator();

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: messageText })
            });

            if (!res.ok) {
                throw new Error(`Server error: ${res.status}`);
            }

            const data = await res.json();
            
            removeTypingIndicator();
            appendMessage('khaal', data.reponse);

        } catch (error) {
            console.error('Error fetching response:', error);
            removeTypingIndicator();
            appendMessage('khaal', "Désolé, une erreur de communication est survenue.");
        }
    }

    function appendMessage(sender, text) {
        const messageEl = document.createElement('div');
        messageEl.className = `message ${sender}`;

        const avatar = sender === 'khaal' ? 'KH' : 'VOUS';
        const senderName = sender === 'khaal' ? 'Khaal' : 'Vous';

        const formattedText = text.replace(/\\n/g, '<br>');

        messageEl.innerHTML = `
            <div class="message-avatar">${avatar}</div>
            <div class="message-content">
                <div class="message-sender">${senderName}</div>
                <div class="message-text">
                    <p>${formattedText}</p>
                </div>
            </div>
        `;
        chatContainer.appendChild(messageEl);
        scrollToBottom();
    }
    
    function showTypingIndicator() {
        if (document.getElementById('typing-indicator')) return;

        const typingEl = document.createElement('div');
        typingEl.id = 'typing-indicator';
        typingEl.className = 'message khaal';
        typingEl.innerHTML = `
            <div class="message-avatar">KH</div>
            <div class="message-content">
                <div class="message-sender">Khaal</div>
                <div class="message-text">
                    <div class="typing-dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>
        `;

        // Add CSS for typing dots
        const style = document.createElement('style');
        style.textContent = `
            .typing-dots span {
                display: inline-block;
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: var(--fg-muted);
                animation: typing-bounce 1.2s infinite ease-in-out;
            }
            .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
            .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
            @keyframes typing-bounce {
                0%, 80%, 100% { transform: scale(0); }
                40% { transform: scale(1.0); }
            }
        `;
        typingEl.appendChild(style);
        chatContainer.appendChild(typingEl);
        scrollToBottom();
    }

    function removeTypingIndicator() {
        const typingEl = document.getElementById('typing-indicator');
        if (typingEl) {
            typingEl.remove();
        }
    }

    function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // Initial UI state
    updateLogoVisibility();

    // Initial focus
    userInput.focus();

</script>
</body>
</html>
